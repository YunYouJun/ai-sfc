# Cloudflare Pages（全球镜像 ai-sfc.yunyoujun.cn / ai-sfc.pages.dev）配置。
# 构建时 nuxt.config 在 CF_PAGES=1 下用 static preset → 纯静态产物（无 _worker.js），
# 避免与根目录 functions/ 冲突；/api 由 functions/ 作为 CF Pages Functions 承载。
# EdgeOne 部署忽略本文件、不受影响。
name = "ai-sfc"
compatibility_date = "2024-09-23"
compatibility_flags = [ "nodejs_compat" ]
pages_build_output_dir = ".output/public"
